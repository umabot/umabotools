name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown2
      
      - name: Convert Markdown to HTML
        run: python convert_docs.py
        
      - name: Verify index.html generation
        run: |
          if [ ! -f "index.html" ]; then
            echo "ERROR: index.html was not generated!"
            exit 1
          fi
          echo "✓ index.html generated successfully"
        
      - name: List dist contents
        run: |
          echo "Contents of dist directory:"
          ls -R dist/
          echo "Root directory contents:"
          ls -la

      - name: Prepare Deployment
        run: |
          # Create a clean folder for deployment
          mkdir _site
          
          # Copy HTML files (including generated index.html)
          cp *.html _site/
          
          # Copy converted documentation
          cp -r dist _site/
          
          # Copy assets (images, snippets)
          if [ -d "assets" ]; then cp -r assets _site/; fi
          
          # Copy docs folder if needed (some pages might reference assets in docs)
          if [ -d "docs" ]; then cp -r docs _site/; fi
          
          # Create .nojekyll inside the deployment folder to prevent 404s
          touch _site/.nojekyll
          
          # Debug: Show what we are about to upload
          echo "Final deployment folder structure:"
          ls -R _site/
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
