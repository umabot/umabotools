name: Python Tool Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'tools/**'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'tools/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install

    - name: Install the project
      run: uv sync --all-extras --dev

    - name: Run tests
      run: uv run pytest tools/mdproperties/test_mdproperties.py
