<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umabotools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0e15;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #39ff14;
            font-size: 28px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #39ff14;
        }
        . tools {
            list-style: none;
        }
        .tools li {
            margin-bottom: 15px;
        }
        .tools a {
            color: #39ff14;
            text-decoration:  none;
            display: inline-block;
            transition: all 0.2s;
            padding: 2px 0;
            border-bottom: 1px solid transparent;
        }
        .tools a:hover {
            border-bottom: 1px solid #39ff14;
            text-shadow: 0 0 8px #39ff14;
        }
        .tools a:: before {
            content: '> ';
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tools a:hover::before {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Umabotools</h1>
        <ul class="tools">
            <li><a href="spaceinvaders.html">Space Invaders</a></li>
        </ul>
    </div>
</body>
</html>
